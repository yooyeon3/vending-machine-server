<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>PIMTO - 로그인</title>
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.8/dist/web/static/pretendard.css" />
    <style>
        /* 전역 설정 */
        * { box-sizing: border-box; }
        body {
            margin: 0;
            font-family: 'Pretendard', sans-serif;
            background-color: #f4f7f6;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            color: #333;
        }

        /* 상단 네비게이션 바 */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 40px;
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255,255,255,0.3);
            box-shadow: 0 4px 6px rgba(0,0,0,0.02);
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .header .logo { display: flex; align-items: center; }
        .logo-image { height: 45px; transition: transform 0.3s ease; }
        .logo-image:hover { transform: scale(1.05); }

        .header .nav a {
            margin-left: 25px;
            text-decoration: none;
            color: #555;
            font-weight: 600;
            font-size: 16px;
            transition: color 0.3s ease;
        }
        .header .nav a:hover { color: #6e8efb; }

        /* 메인 콘텐츠 영역 */
        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }

        /* PIMTO 타이틀 */
        .title {
            font-size: 64px;
            font-weight: 800;
            margin-bottom: 10px;
            letter-spacing: 4px;
            background: linear-gradient(135deg, #6e8efb, #a777e3);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* 세련된 물결 무늬 */
        .wavy-line {
            width: 150px;
            height: 15px;
            background: url('data:image/svg+xml;utf8,<svg viewBox="0 0 100 20" xmlns="http://www.w3.org/2000/svg"><path d="M0 10 Q 12.5 0, 25 10 T 50 10 T 75 10 T 100 10" fill="none" stroke="%23a777e3" stroke-width="3" stroke-linecap="round"/></svg>') repeat-x;
            margin-bottom: 50px;
            opacity: 0.7;
        }

        /* 로그인 옵션 컨테이너 */
        .login-container {
            display: flex;
            gap: 30px;
        }

        /* 로그인 버튼 박스 디자인 */
        .login-box {
            width: 260px;
            height: 200px;
            background-color: #ffffff;
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            font-weight: 700;
            color: #444;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
            transition: all 0.3s ease;
            text-decoration: none; /* a태그 밑줄 제거 */
        }

        /* 버튼별 색상 및 마우스 오버 효과 설정 */
        .normal-login:hover {
            transform: translateY(-8px);
            box-shadow: 0 15px 30px rgba(110, 142, 251, 0.3);
            background: linear-gradient(135deg, #6e8efb, #a777e3);
            color: white;
        }

        .social-login:hover {
            transform: translateY(-8px);
            box-shadow: 0 15px 30px rgba(254, 211, 48, 0.4);
            background: linear-gradient(135deg, #fed330, #feca57); /* 카카오톡 느낌의 노란색 */
            color: #333;
        }

        /* 아이콘 자리를 위한 이모지 추가 */
        .icon { font-size: 36px; margin-bottom: 15px; transition: transform 0.3s ease;}
        .login-box:hover .icon { transform: scale(1.2); }
    </style>
</head>
<body>
<div class="header">
    <div class="logo">
        <a href="/">
            <img src="/images/vending-logo.png" class="logo-image" alt="PIMTO 로고">
        </a>
    </div>
    <div class="nav">
        <a href="/login" style="color: #6e8efb;">로그인</a>
        <a href="#">회원가입</a>
    </div>
</div>

<div class="main">
    <div class="title">PIMTO</div>
    <div class="wavy-line"></div>

    <div class="login-container">
        <a href="#" class="login-box normal-login">
            <span class="icon">✉️</span>
            이메일 로그인
        </a>
        <a href="#" class="login-box social-login">
            <span class="icon">💬</span>
            카카오 로그인
        </a>
    </div>
</div>
</body>
</html>
