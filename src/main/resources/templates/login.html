<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PIMTO - 로그인</title>
    <style>
        /* 전체 화면 중앙 정렬을 위한 기본 스타일 */
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: #f4f6f9; /* 부드러운 연그레이 배경 */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            position: relative;
            overflow: hidden;
        }

        /* 💡 왼쪽 상단 고정 로고 스타일 */
        .logo-image {
            position: absolute;
            top: 25px;
            left: 25px;
            width: 130px; /* 로고 크기 */
            height: auto;
            z-index: 100;
        }

        /* 로그인 박스 컨테이너 */
        .login-container {
            background-color: #ffffff;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08); /* 부드러운 그림자 */
            width: 100%;
            max-width: 400px;
            box-sizing: border-box;
            text-align: center;
        }

        /* 서비스 타이틀 */
        .login-container h2 {
            margin: 0 0 30px 0;
            color: #2c3e50;
            font-size: 32px;
            font-weight: 700;
            letter-spacing: 1px;
        }

        /* 입력 폼 그룹 */
        .input-group {
            margin-bottom: 22px;
            text-align: left;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            color: #555555;
            font-size: 14px;
            font-weight: 600;
        }

        .input-group input {
            width: 100%;
            padding: 13px;
            border: 1px solid #dcdde1;
            border-radius: 8px;
            font-size: 16px;
            box-sizing: border-box;
            transition: all 0.2s ease-in-out;
        }

        /* 입력창 클릭(포커스) 시 하이라이트 효과 */
        .input-group input:focus {
            border-color: #4a90e2;
            box-shadow: 0 0 6px rgba(74, 144, 226, 0.2);
            outline: none;
        }

        /* 로그인 버튼 스타일 */
        .login-btn {
            width: 100%;
            padding: 14px;
            background-color: #4a90e2; /* 세련된 블루 톤 */
            color: #ffffff;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s ease;
            margin-top: 10px;
        }

        .login-btn:hover {
            background-color: #357abd; /* 마우스 올렸을 때 더 짙은 블루 */
        }

        /* 하단 링크 (회원가입 등) */
        .login-footer {
            margin-top: 25px;
            font-size: 14px;
            color: #7f8c8d;
        }

        .login-footer a {
            color: #4a90e2;
            text-decoration: none;
            font-weight: 600;
            margin-left: 5px;
        }

        .login-footer a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

<img class="logo-image" th:src="@{/images/vending-logo.png}" alt="PIMTO 로고">

<div class="login-container">
    <h2>PIMTO</h2>

    <form action="/login" method="POST">
        <div class="input-group">
            <label for="username">아이디</label>
            <input type="text" id="username" name="username" placeholder="아이디를 입력하세요" required>
        </div>

        <div class="input-group">
            <label for="password">비밀번호</label>
            <input type="password" id="password" name="password" placeholder="비밀번호를 입력하세요" required>
        </div>

        <button type="submit" class="login-btn">로그인</button>
    </form>

    <div class="login-footer">
        아직 계정이 없으신가요? <a href="/signup">회원가입</a>
    </div>
</div>

</body>
</html>
