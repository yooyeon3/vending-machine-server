<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PIMTO - 로그인</title>
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.8/dist/web/static/pretendard.css" />
    <style>
        /* 전역 설정 */
        * { box-sizing: border-box; }
        body {
            margin: 0;
            font-family: 'Pretendard', sans-serif;
            background-color: #f8fafc; /* 밝은 회색 배경 */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            position: relative; /* 절대 위치(로고)의 기준점이 됩니다 */
        }

        /* 좌측 상단 로고 설정 */
        .top-left-logo {
            position: absolute;
            top: 30px;
            left: 40px;
            height: 45px; /* 로고 크기 */
            transition: opacity 0.3s ease;
        }

        .top-left-logo:hover {
            opacity: 0.8;
        }

        /* 로그인 컨테이너 (중앙 카드) */
        .login-container {
            background-color: #ffffff;
            padding: 50px 40px;
            border-radius: 24px;
            box-shadow: 0 10px 40px rgba(148, 163, 184, 0.15); /* 부드러운 그림자 */
            width: 100%;
            max-width: 420px;
            text-align: center;
        }

        /* PIMTO 로고/타이틀 (그라데이션) */
        .brand-title {
            font-size: 36px;
            font-weight: 800;
            margin-bottom: 10px;
            letter-spacing: 2px;
            background: linear-gradient(135deg, #6e8efb, #a777e3);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .brand-subtitle {
            font-size: 16px;
            color: #64748b;
            margin-bottom: 40px;
        }

        /* 입력 그룹 */
        .input-group {
            text-align: left;
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            color: #1e293b;
            margin-bottom: 8px;
            padding-left: 4px;
        }

        .input-group input {
            width: 100%;
            padding: 14px 16px;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            font-size: 16px;
            transition: all 0.3s ease;
            background-color: #f8fafc;
        }

        .input-group input:focus {
            border-color: #6e8efb;
            background-color: #ffffff;
            outline: none;
            box-shadow: 0 0 0 3px rgba(110, 142, 251, 0.1);
        }

        /* 로그인 버튼 */
        .login-button {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #6e8efb, #a777e3);
            color: #ffffff;
            border: none;
            border-radius: 12px;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            transition: opacity 0.3s ease;
            margin-top: 10px;
        }

        .login-button:hover {
            opacity: 0.9;
        }

        /* 하단 링크 (회원가입 등) */
        .extra-links {
            margin-top: 25px;
            font-size: 14px;
            color: #64748b;
        }

        .extra-links a {
            color: #6e8efb;
            text-decoration: none;
            font-weight: 600;
            margin: 0 8px;
        }

        .extra-links a:hover {
            text-decoration: underline;
        }

        /* 에러 메시지 */
        .error-message {
            color: #ef4444;
            background-color: #fef2f2;
            padding: 12px;
            border-radius: 8px;
            font-size: 14px;
            margin-bottom: 20px;
            border: 1px solid #fecaca;
        }
    </style>
</head>
<body>

<a href="/">
    <img th:src="@{/images/vending-logo.png}" alt="PIMTO Logo" class="top-left-logo">
</a>

<div class="login-container">
    <div class="brand-title">PIMTO</div>
    <div class="brand-subtitle">나만의 스마트 자판기 플랫폼</div>

    <div th:if="${param.error}" class="error-message">
        아이디 또는 비밀번호가 올바르지 않습니다.
    </div>

    <form th:action="@{/login}" method="post">
        <div class="input-group">
            <label for="username">아이디</label>
            <input type="text" id="username" name="username" placeholder="아이디를 입력하세요" required autofocus>
        </div>

        <div class="input-group">
            <label for="password">비밀번호</label>
            <input type="password" id="password" name="password" placeholder="비밀번호를 입력하세요" required>
        </div>

        <button type="submit" class="login-button">로그인</button>
    </form>
    <div class="extra-links">
        <a href="#">아이디 찾기</a> |
        <a href="#">비밀번호 찾기</a> |
        <a href="#">회원가입</a>
    </div>
</div>

</body>
</html>
