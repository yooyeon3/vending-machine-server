<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>PIMTO 로그인</title>
    <style>
        /* 기본 여백 제거 및 전체 화면 설정 */
        body { margin: 0; font-family: 'Malgun Gothic', sans-serif; display: flex; flex-direction: column; height: 100vh; }

        /* 상단 네비게이션 바 (로그인/회원가입) */
        .header { display: flex; justify-content: space-between; align-items: center; padding: 15px 30px; border-bottom: 2px solid #000; }
        .header .logo { font-size: 24px; font-weight: bold; letter-spacing: 2px; }
        .header .nav a { margin-left: 20px; text-decoration: none; color: #000; font-weight: bold; font-size: 16px; }

        /* 메인 콘텐츠 영역 (화면 중앙 정렬) */
        .main { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; }

        /* PIMTO 타이틀 */
        .title { font-size: 56px; font-weight: bold; margin-bottom: 10px; font-style: italic; letter-spacing: 5px; }

        /* 물결 무늬 장식 */
        .wavy-line {
            width: 200px;
            height: 20px;
            background: url('data:image/svg+xml;utf8,<svg viewBox="0 0 100 20" xmlns="http://www.w3.org/2000/svg"><path d="M0 10 Q 12.5 0, 25 10 T 50 10 T 75 10 T 100 10" fill="none" stroke="black" stroke-width="2"/></svg>') repeat-x;
            margin-bottom: 60px;
        }

        /* 두 개의 큰 박스 영역 */
        .box-container { display: flex; gap: 50px; }
        .box {
            width: 250px;
            height: 180px;
            border: 2px solid #000;
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .box:hover { background-color: #f4f4f4; transform: translateY(-5px); box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
    </style>
</head>
<body>
<div class="header">
    <div class="logo">📁 PIMTO</div>
    <div class="nav">
        <a href="/login">로그인</a>
        <a href="#">회원가입</a>
    </div>
</div>

<div class="main">
    <div class="title">PIMTO</div>
    <div class="wavy-line"></div>

    <div class="box-container">
        <div class="box">일반 로그인</div>
        <div class="box">소셜 로그인</div>
    </div>
</div>
</body>
</html>
