<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>PIMTO - 나만의 스마트 이동식 자판기</title>
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.8/dist/web/static/pretendard.css" />
    <style>
        /* 전역 설정 */
        * { box-sizing: border-box; }
        body {
            margin: 0;
            font-family: 'Pretendard', sans-serif;
            background-color: #f8fafc; /* 배경을 더 밝고 깨끗한 톤으로 변경 */
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            color: #333;
        }

        /* 상단 네비게이션 바 */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 40px;
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(226, 232, 240, 0.8);
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .header .logo { display: flex; align-items: center; }
        .logo-image { height: 45px; transition: transform 0.3s ease; }
        .logo-image:hover { transform: scale(1.05); }

        .header .nav a {
            margin-left: 25px;
            text-decoration: none;
            color: #475569;
            font-weight: 600;
            font-size: 16px;
            transition: color 0.3s ease;
        }
        .header .nav a:hover { color: #6e8efb; }

        /* 메인 콘텐츠 영역 */
        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 60px 20px;
        }

        /* PIMTO 타이틀 */
        .title {
            font-size: 64px;
            font-weight: 800;
            margin-bottom: 12px;
            letter-spacing: 4px;
            background: linear-gradient(135deg, #6e8efb, #a777e3);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* 메시지 문구 */
        .recommend-message {
            font-size: 18px;
            font-weight: 500;
            color: #64748b;
            margin-bottom: 55px;
            letter-spacing: -0.5px;
            text-align: center;
            line-height: 1.5;
        }

        /* 박스 레이아웃 */
        .box-container {
            display: flex;
            gap: 40px;
            max-width: 900px;
            width: 100%;
            justify-content: center;
            flex-wrap: wrap;
        }

        /* ---------------------------------------------------
           ✨ 왼쪽 이용법 박스
        --------------------------------------------------- */
        .box-left {
            width: 320px;
            height: 380px;
            background-color: #ffffff;
            border-radius: 24px;
            padding: 40px;
            /* 아주 부드럽고 넓게 퍼지는 고급스러운 그림자 */
            box-shadow: 0 10px 40px rgba(148, 163, 184, 0.15);
            transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
            display: flex;
            flex-direction: column;
        }
        .box-left:hover {
            transform: translateY(-8px);
            box-shadow: 0 20px 40px rgba(148, 163, 184, 0.25);
        }

        .usage-title {
            font-size: 24px;
            font-weight: 800;
            color: #1e293b;
            margin-bottom: 25px;
            text-align: left;
            border-bottom: 2px solid #f1f5f9;
            padding-bottom: 15px;
        }
        .usage-list {
            list-style: none;
            padding: 0;
            margin: 0;
            font-size: 16px;
            line-height: 2.4;
            font-weight: 600;
            color: #475569;
        }
        .usage-list li { position: relative; padding-left: 24px; }
        .usage-list li::before {
            content: '✨';
            position: absolute;
            left: -2px;
            font-size: 14px;
        }

        /* ---------------------------------------------------
           ✨ 오른쪽 사진 박스 (이미지가 가장 깔끔하게 보이는 마법)
        --------------------------------------------------- */
        .box-right {
            width: 320px;
            height: 380px;
            border-radius: 24px;
            position: relative; /* 오버레이를 위한 필수 속성 */
            overflow: hidden; /* 이미지가 둥근 모서리를 튀어나가지 않게 자름 */
            box-shadow: 0 10px 40px rgba(148, 163, 184, 0.15);
            transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
            background-color: #f1f5f9; /* 이미지 로딩 전 보이는 깔끔한 배경색 */
        }

        .vending-image {
            width: 100%;
            height: 100%;
            /* 찌그러짐 방지 및 꽉 채우기 (핵심!) */
            object-fit: cover;
            /* 이미지의 중앙을 기준으로 크롭되게 설정 */
            object-position: center;
            display: block;
            transition: transform 0.5s ease;
        }

        /* 이미지 위를 은은하게 덮어주는 그라데이션 효과 (사진이 훨씬 깊이 있어 보입니다) */
        .box-right::after {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(to bottom, rgba(0,0,0,0) 60%, rgba(0,0,0,0.15) 100%);
            pointer-events: none;
        }

        /* 마우스 오버 시 이미지만 부드럽게 확대 (테두리 밖으로 안 나감) */
        .box-right:hover {
            transform: translateY(-8px);
            box-shadow: 0 20px 40px rgba(148, 163, 184, 0.25);
        }
        .box-right:hover .vending-image {
            transform: scale(1.07);
        }

        /* 하단 푸터 */
        .footer {
            background-color: #ffffff;
            border-top: 1px solid #f1f5f9;
            padding: 25px 40px;
            margin-top: auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 14px;
            color: #94a3b8;
        }
        .footer-info { margin: 0; }
        .footer-links a { margin-left: 20px; text-decoration: none; color: #94a3b8; transition: color 0.3s; }
        .footer-links a:hover { color: #6e8efb; }

        /* 모바일 대응 */
        @media (max-width: 768px) {
            .box-container { gap: 20px; }
            .footer { flex-direction: column; gap: 15px; text-align: center; padding: 20px; }
            .footer-links { display: flex; gap: 15px; justify-content: center; }
            .footer-links a { margin: 0; }
        }
    </style>
</head>
<body>
<div class="header">
    <div class="logo">
        <a href="/">
            <img src="/images/vending-logo.png" class="logo-image" alt="PIMTO 로고">
        </a>
    </div>
    <div class="nav">
        <a href="/login">로그인</a>
        <a href="#">회원가입</a>
    </div>
</div>

<div class="main">
    <div class="title">PIMTO</div>
    <div class="recommend-message">
        내 손안의 스마트 자판기, <span style="color: #6e8efb; font-weight: 700;">PIMTO</span>와 함께 언제 어디서나 더 편리한 일상을 경험해 보세요.
    </div>

    <div class="box-container">
        <div class="box-left">
            <div class="usage-title">이용법 안내</div>
            <ul class="usage-list">
                <li>원하는 자판기를 선택하세요.</li>
                <li>투입할 금액을 충전합니다.</li>
                <li>상품을 클릭해 구매하세요.</li>
                <li>마이페이지에서 내역을 확인!</li>
            </ul>
        </div>

        <div class="box-right">
            <img th:src="@{/images/IMG_6255.jpg}" class="vending-image" alt="PIMTO 자판기 이미지">
        </div>
    </div>
</div>

<div class="footer">
    <p class="footer-info">© 2026 PIMTO. All rights reserved. | 나만의 이동식 자판기 플랫폼</p>
    <div class="footer-links">
        <a href="#">이용약관</a>
        <a href="#">개인정보처리방침</a>
        <a href="#">고객센터</a>
    </div>
</div>
</body>
</html>
