<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>PIMTO - 관리자</title>
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.8/dist/web/static/pretendard.css" />
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Pretendard', sans-serif; background: #d4d8dd; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

        .header {
            background: white;
            padding: 14px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #94a3b8;
            flex-shrink: 0;
            position: relative;
            z-index: 100;
        }
        .header-left { display: flex; align-items: center; gap: 12px; }
        .header-left img { height: 34px; object-fit: contain; }
        .header-left .admin-label { font-size: 17px; font-weight: 700; color: #1e293b; }
        .logout-btn {
            padding: 8px 16px;
            background: #f1f5f9;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            color: #64748b;
        }

        .hamburger {
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 5px;
            width: 32px;
            height: 32px;
            cursor: pointer;
            padding: 4px;
            border-radius: 6px;
            transition: background 0.2s;
        }
        .hamburger:hover { background: #f1f5f9; }
        .hamburger span {
            display: block;
            width: 100%;
            height: 2px;
            background: #64748b;
            border-radius: 2px;
        }

        /* 오버레이 - 슬라이드 열릴때만 어둡게 */
        .sidebar-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            background: rgba(0,0,0,0.2);
            z-index: 150;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.25s;
        }
        .sidebar-overlay.show {
            opacity: 1;
            pointer-events: all;
        }

        /* 사이드바 */
        .sidebar {
            position: fixed;
            top: 0; left: 0;
            width: 220px;
            height: 40vh;
            background: white;
            border-right: 2px solid #e2e8f0;
            z-index: 200;
            display: flex;
            flex-direction: column;
            transform: translateX(-100%);
            transition: transform 0.25s ease;
            box-shadow: none;
        }
        .sidebar.open { transform: translateX(0); }

        /* 사이드바 내 로고 영역 */
        .sidebar-logo {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 18px 22px 14px;
            border-bottom: 1px solid #e2e8f0;
            margin-bottom: 8px;
        }
        .sidebar-logo img { height: 28px; object-fit: contain; }
        .sidebar-logo span { font-size: 15px; font-weight: 700; color: #1e293b; }

        .sidebar-menu { list-style: none; }
        .sidebar-menu li a {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 13px 22px;
            font-size: 14px;
            font-weight: 500;
            color: #64748b;
            text-decoration: none;
            border-left: 3px solid transparent;
            transition: all 0.2s;
        }
        .sidebar-menu li a:hover {
            background: #f8fafc;
            color: #6e8efb;
            border-left-color: #6e8efb;
        }
        .sidebar-menu li a.active {
            background: #f0f0ff;
            color: #6e8efb;
            border-left-color: #6e8efb;
            font-weight: 700;
        }

        .wrapper { display: flex; flex: 1; overflow: hidden; background: #d4d8dd; }

        .content {
            flex: 1;
            display: flex;
            gap: 20px;
            padding: 20px 24px;
            overflow: hidden;
            background: #d4d8dd;
        }

        .left-panel {
            width: 40%;
            background: white;
            border-radius: 16px;
            padding: 20px;
            border: 1px solid #b0b8c4;
            overflow-y: auto;
            flex-shrink: 0;
        }

        .right-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 14px;
            overflow: hidden;
        }

        .panel-title { font-size: 15px; font-weight: 700; color: #1e293b; margin-bottom: 14px; display: flex; align-items: center; gap: 6px; }

        .menu-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 20px;
        }
        .menu-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 10px 8px;
            background: #f8fafc;
            border-radius: 12px;
            border: 1px solid #e2e8f0;
        }
        .menu-item img {
            width: 100%;
            aspect-ratio: 1;
            object-fit: contain;
            border-radius: 8px;
            margin-bottom: 8px;
        }
        .no-img {
            width: 100%;
            aspect-ratio: 1;
            background: #e2e8f0;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #94a3b8;
            font-size: 11px;
            text-align: center;
            margin-bottom: 8px;
            padding: 8px;
        }
        .menu-info { text-align: center; width: 100%; }
        .menu-info .name { font-weight: 600; font-size: 13px; color: #1e293b; margin-bottom: 6px; }

        .stock-control { display: flex; align-items: center; justify-content: center; gap: 8px; margin-top: 6px; }
        .stock-btn {
            width: 24px; height: 24px;
            border: 1px solid #e2e8f0;
            border-radius: 6px;
            background: white;
            cursor: pointer;
            font-size: 14px;
            font-weight: 700;
            color: #6e8efb;
            display: flex; align-items: center; justify-content: center;
        }
        .stock-btn:hover { background: #f1f5f9; }
        .stock-count { font-size: 16px; font-weight: 700; color: #1e293b; min-width: 20px; text-align: center; }
        .stock-label { font-size: 11px; color: #64748b; margin-top: 3px; }

        .manage-section { border-top: 1px solid #e2e8f0; padding-top: 16px; margin-top: 4px; }
        .manage-title { font-size: 13px; font-weight: 700; color: #1e293b; margin-bottom: 10px; }
        .manage-input-row { display: flex; gap: 8px; margin-bottom: 10px; }
        .manage-input {
            flex: 1;
            padding: 9px 12px;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            font-size: 13px;
            font-family: 'Pretendard', sans-serif;
        }
        .manage-input:focus { outline: none; border-color: #6e8efb; }
        .add-btn {
            padding: 9px 14px;
            background: white;
            color: #6e8efb;
            border: 1.5px solid #6e8efb;
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            white-space: nowrap;
        }
        .add-btn:hover { background: #f0f0ff; }
        .remove-row { display: flex; gap: 8px; margin-top: 10px; }
        .manage-select {
            flex: 1;
            padding: 9px 12px;
            border: 1.5px solid #6e8efb;
            border-radius: 8px;
            font-size: 13px;
            font-family: 'Pretendard', sans-serif;
            background: white;
            color: #1e293b;
        }
        .remove-btn {
            padding: 9px 14px;
            background: white;
            color: #ef4444;
            border: 1.5px solid #6e8efb;
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            white-space: nowrap;
        }
        .remove-btn:hover { background: #fef2f2; }

        .map-panel {
            background: white;
            border-radius: 16px;
            padding: 20px;
            border: 1px solid #b0b8c4;
            flex: 1;
            overflow: hidden;
        }
        #mapCanvas {
            width: 100%;
            height: calc(100% - 36px);
            border-radius: 10px;
            background: #111;
            display: block;
        }

        .emergency-btn {
            width: 100%;
            padding: 16px;
            background: #fef2f2;
            border: 2px solid #f8a0a0;
            border-radius: 12px;
            color: #ef4444;
            font-size: 17px;
            font-weight: 700;
            cursor: pointer;
            flex-shrink: 0;
        }
        .emergency-btn:hover { background: #fee2e2; }
        .emergency-btn.active { background: #ef4444; color: white; border-color: #ef4444; }
    </style>
</head>
<body>

<div class="sidebar-overlay" id="overlay"></div>

<!-- 사이드바 -->
<div class="sidebar" id="sidebar">
    <!-- 사이드바 내 로고 -->
    <div class="sidebar-logo">
        <img src="/images/vending-logo.png" alt="PIMTO 로고">
        <span>관리자</span>
    </div>
    <ul class="sidebar-menu">
        <li><a href="#" class="active">📦 재고관리</a></li>
        <li><a href="#">📊 매출통계</a></li>
        <li><a href="#">👥 회원관리</a></li>
        <li><a href="#"><img src="/images/pimto.png" style="width:18px;height:18px;object-fit:contain;vertical-align:middle;"> 로봇관리</a></li>
        <li><a href="#">💬 문의기능</a></li>
    </ul>
</div>

<!-- 헤더 -->
<div class="header">
    <div class="header-left">
        <div class="hamburger" id="hamburger">
            <span></span>
            <span></span>
            <span></span>
        </div>
        <img src="/images/vending-logo.png" alt="PIMTO 로고">
        <span class="admin-label">관리자</span>
    </div>
    <form th:action="@{/logout}" method="post">
        <button class="logout-btn" type="submit">로그아웃</button>
    </form>
</div>

<div class="wrapper">
    <div class="content">

        <div class="left-panel">
            <div class="panel-title">🥤 음료 재고</div>
            <div class="menu-grid" id="menuGrid">
                <div class="menu-item" id="item-레쓰비">
                    <img src="/images/letsbe.jpg" alt="레쓰비">
                    <div class="menu-info">
                        <div class="name">레쓰비</div>
                        <div class="stock-control">
                            <button class="stock-btn" onclick="changeStock('레쓰비', -1)">−</button>
                            <span class="stock-count" id="count-레쓰비">0</span>
                            <button class="stock-btn" onclick="changeStock('레쓰비', 1)">+</button>
                        </div>
                        <div class="stock-label">개 남음</div>
                    </div>
                </div>
                <div class="menu-item" id="item-펩시콜라">
                    <img src="/images/pepsi.png" alt="펩시콜라">
                    <div class="menu-info">
                        <div class="name">펩시콜라</div>
                        <div class="stock-control">
                            <button class="stock-btn" onclick="changeStock('펩시콜라', -1)">−</button>
                            <span class="stock-count" id="count-펩시콜라">0</span>
                            <button class="stock-btn" onclick="changeStock('펩시콜라', 1)">+</button>
                        </div>
                        <div class="stock-label">개 남음</div>
                    </div>
                </div>
            </div>

            <div class="manage-section">
                <div class="manage-title">➕ 음료 추가</div>
                <div class="manage-input-row">
                    <input class="manage-input" id="newDrinkName" type="text" placeholder="음료 이름 입력">
                    <button class="add-btn" onclick="addDrink()">추가</button>
                </div>
                <div class="manage-title" style="margin-top: 14px;">➖ 음료 제거</div>
                <div class="remove-row">
                    <select class="manage-select" id="removeDrinkSelect">
                        <option value="레쓰비">레쓰비</option>
                        <option value="펩시콜라">펩시콜라</option>
                    </select>
                    <button class="remove-btn" onclick="removeDrink()">제거</button>
                </div>
            </div>
        </div>

        <div class="right-panel">
            <div class="map-panel">
                <div class="panel-title">
                    <img src="/images/pimto.png" style="width:20px;height:20px;object-fit:contain;">
                    PIMTO 현재 위치
                </div>
                <canvas id="mapCanvas"></canvas>
            </div>
            <button class="emergency-btn" id="emergencyBtn" onclick="emergencyCall()">🚨 긴급 호출</button>
        </div>

    </div>
</div>

<script>
    // 사이드바 hover 제어
    const hamburger = document.getElementById('hamburger');
    const sidebar = document.getElementById('sidebar');
    const overlay = document.getElementById('overlay');

    hamburger.addEventListener('mouseenter', () => {
        sidebar.classList.add('open');
        overlay.classList.add('show');
    });
    sidebar.addEventListener('mouseleave', () => {
        sidebar.classList.remove('open');
        overlay.classList.remove('show');
    });

    // 재고 관리
    const stocks = { '레쓰비': 0, '펩시콜라': 0 };

    function changeStock(name, delta) {
        const current = stocks[name] || 0;
        const newVal = current + delta;
        if (newVal < 0 || newVal > 2) return;
        stocks[name] = newVal;
        document.getElementById('count-' + name).textContent = newVal;
    }

    function addDrink() {
        const name = document.getElementById('newDrinkName').value.trim();
        if (!name) return alert('음료 이름을 입력하세요.');
        if (stocks[name] !== undefined) return alert('이미 존재하는 음료입니다.');
        stocks[name] = 0;
        const grid = document.getElementById('menuGrid');
        const div = document.createElement('div');
        div.className = 'menu-item';
        div.id = 'item-' + name;
        div.innerHTML = `
            <div class="no-img">이미지 준비 중..</div>
            <div class="menu-info">
                <div class="name">${name}</div>
                <div class="stock-control">
                    <button class="stock-btn" onclick="changeStock('${name}', -1)">−</button>
                    <span class="stock-count" id="count-${name}">0</span>
                    <button class="stock-btn" onclick="changeStock('${name}', 1)">+</button>
                </div>
                <div class="stock-label">개 남음</div>
            </div>`;
        grid.appendChild(div);
        const select = document.getElementById('removeDrinkSelect');
        const option = document.createElement('option');
        option.value = name;
        option.textContent = name;
        select.appendChild(option);
        document.getElementById('newDrinkName').value = '';
    }

    function removeDrink() {
        const select = document.getElementById('removeDrinkSelect');
        const name = select.value;
        if (!name) return;
        delete stocks[name];
        const item = document.getElementById('item-' + name);
        if (item) item.remove();
        select.remove(select.selectedIndex);
    }

    // 임시 지도
    const canvas = document.getElementById('mapCanvas');
    const ctx = canvas.getContext('2d');
    const HOME = { x: 0.15, y: 0.5 };
    let robot = { x: 0.5, y: 0.5 };
    let isReturning = false;
    const robotImg = new Image();
    robotImg.src = '/images/pimto.png';

    function resizeCanvas() {
        canvas.width = canvas.offsetWidth;
        canvas.height = canvas.offsetHeight;
        drawMap();
    }

    function drawMap() {
        const W = canvas.width, H = canvas.height;
        ctx.clearRect(0, 0, W, H);
        ctx.fillStyle = '#111827';
        ctx.fillRect(0, 0, W, H);

        ctx.strokeStyle = 'rgba(255,255,255,0.08)';
        ctx.lineWidth = 1;
        for (let x = 0; x < W; x += 40) { ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,H); ctx.stroke(); }
        for (let y = 0; y < H; y += 40) { ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(W,y); ctx.stroke(); }

        ctx.strokeStyle = 'rgba(255,255,255,0.3)';
        ctx.lineWidth = 2;
        ctx.strokeRect(20, 20, W-40, H-40);
        ctx.beginPath();
        ctx.moveTo(W*0.4, 20); ctx.lineTo(W*0.4, H*0.6);
        ctx.moveTo(W*0.4, H*0.6); ctx.lineTo(W*0.7, H*0.6);
        ctx.stroke();

        const hx = HOME.x * W, hy = HOME.y * H;
        ctx.fillStyle = 'rgba(110,142,251,0.2)';
        ctx.beginPath(); ctx.arc(hx, hy, 20, 0, Math.PI*2); ctx.fill();
        ctx.strokeStyle = '#6e8efb'; ctx.lineWidth = 2;
        ctx.beginPath(); ctx.arc(hx, hy, 20, 0, Math.PI*2); ctx.stroke();
        ctx.fillStyle = '#6e8efb';
        ctx.font = 'bold 11px Pretendard';
        ctx.textAlign = 'center';
        ctx.fillText('원위치', hx, hy+35);

        const rx = robot.x * W, ry = robot.y * H;
        if (isReturning) {
            ctx.strokeStyle = 'rgba(110,142,251,0.4)';
            ctx.lineWidth = 1.5;
            ctx.setLineDash([6,4]);
            ctx.beginPath(); ctx.moveTo(rx,ry); ctx.lineTo(hx,hy); ctx.stroke();
            ctx.setLineDash([]);
        }

        ctx.save();
        ctx.beginPath();
        ctx.arc(rx, ry, 20, 0, Math.PI*2);
        ctx.clip();
        ctx.drawImage(robotImg, rx-20, ry-20, 40, 40);
        ctx.restore();

        ctx.fillStyle = isReturning ? '#f59e0b' : '#10b981';
        ctx.font = 'bold 11px Pretendard';
        ctx.textAlign = 'center';
        ctx.fillText(isReturning ? '복귀 중...' : '대기 중', rx, ry+36);
    }

    function emergencyCall() {
        const btn = document.getElementById('emergencyBtn');
        if (isReturning) return;
        isReturning = true;
        btn.classList.add('active');
        btn.textContent = '🔄 원위치 복귀 중...';
        function animate() {
            const dx = HOME.x - robot.x, dy = HOME.y - robot.y;
            if (Math.sqrt(dx*dx+dy*dy) < 0.01) {
                robot.x = HOME.x; robot.y = HOME.y;
                isReturning = false;
                btn.classList.remove('active');
                btn.textContent = '🚨 긴급 호출';
                drawMap(); return;
            }
            robot.x += dx * 0.02;
            robot.y += dy * 0.02;
            drawMap();
            requestAnimationFrame(animate);
        }
        animate();
    }

    robotImg.onload = () => drawMap();
    window.addEventListener('resize', resizeCanvas);
    setTimeout(resizeCanvas, 100);
</script>

</body>
</html>
